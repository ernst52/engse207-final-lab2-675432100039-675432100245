<!DOCTYPE html>
<html lang="th">
<head>
  <script src="/config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👤 Profile — Final Lab Set 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #273448;
      --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
      --blue: #3b82f6; --blue2: #2563eb; --green: #22c55e;
      --red: #ef4444; --purple: #a855f7; --radius: 10px;
    }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; }
    h1 { font-size: 1.3rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .4rem; }
    input, textarea { width: 100%; padding: .7rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .9rem; font-family: inherit; }
    textarea { min-height: 80px; resize: vertical; }
    .btn { width: 100%; padding: .8rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; }
    .btn:hover { background: var(--blue2); }
    .btn-back { display: inline-block; margin-bottom: 1rem; color: var(--blue); text-decoration: none; font-size: .9rem; }
    .msg { padding: .6rem 1rem; border-radius: 8px; margin-top: .75rem; font-size: .88rem; text-align: center; }
    .msg.success { background: rgba(34,197,94,.15); color: #86efac; border: 1px solid rgba(34,197,94,.3); }
    .msg.error { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    .info-row { display: flex; justify-content: space-between; padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .88rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
  </style>
</head>
<body>
<div class="card">
  <a href="index.html" class="btn-back">← กลับ Task Board</a>
  <h1>👤 Profile</h1>

  <!-- ข้อมูล read-only -->
  <div style="margin-bottom: 1.5rem;">
    <div class="info-row">
      <span class="info-label">User ID</span>
      <span id="info-id">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Username</span>
      <span id="info-username">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Email</span>
      <span id="info-email">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Role</span>
      <span id="info-role">—</span>
    </div>
  </div>

  <!-- แก้ไข profile -->
  <div class="form-group">
    <label>Display Name</label>
    <input id="display_name" type="text" placeholder="ชื่อที่แสดง" />
  </div>
  <div class="form-group">
    <label>Bio</label>
    <textarea id="bio" placeholder="แนะนำตัวเอง..."></textarea>
  </div>
  <div class="form-group">
    <label>Avatar URL</label>
    <input id="avatar_url" type="text" placeholder="https://..." />
  </div>

  <button class="btn" onclick="updateProfile()">💾 บันทึก Profile</button>
  <div id="msg"></div>
</div>

<script>
  const USER_URL = window.APP_CONFIG?.USER_URL || 'http://localhost:3003';
  const AUTH_URL = window.APP_CONFIG?.AUTH_URL || 'http://localhost:3001';
  const token = localStorage.getItem('jwt_token');

  if (!token) {
    window.location.href = 'index.html';
  }

  async function loadProfile() {
    const res  = await fetch(`${USER_URL}/api/users/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) window.location.href = 'index.html';
      return;
    }

    const u = data.user;
    document.getElementById('info-id').textContent       = u.user_id || u.id || '—';
    document.getElementById('info-username').textContent = u.username || '—';
    document.getElementById('info-email').textContent    = u.email || '—';
    document.getElementById('info-role').textContent     = u.role || '—';
    document.getElementById('display_name').value        = u.display_name || '';
    document.getElementById('bio').value                 = u.bio || '';
    document.getElementById('avatar_url').value          = u.avatar_url || '';
  }

  async function updateProfile() {
    const display_name = document.getElementById('display_name').value;
    const bio          = document.getElementById('bio').value;
    const avatar_url   = document.getElementById('avatar_url').value;

    const res = await fetch(`${USER_URL}/api/users/me`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ display_name, bio, avatar_url })
    });
    const data = await res.json();

    const msgEl = document.getElementById('msg');
    if (res.ok) {
      msgEl.className = 'msg success';
      msgEl.textContent = '✅ อัปเดต Profile สำเร็จ!';
      loadProfile();
    } else {
      msgEl.className = 'msg error';
      msgEl.textContent = '❌ ' + (data.error || 'เกิดข้อผิดพลาด');
    }
  }

  loadProfile();
</script>
</body>
</html>
